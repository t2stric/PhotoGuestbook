<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Guestbook</title>

<!--
  FONT NOTE: Cormorant Garamond, Dancing Script & Montserrat load from
  Google Fonts CDN on first open (internet required once). After that
  the browser caches them locally — no internet needed at your event.
  If you need guaranteed offline fonts from day one, replace the @import
  below with @font-face rules pointing to .woff2 files in the same folder.
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Dancing+Script:wght@600&family=Montserrat:wght@300;400;500&display=swap');

/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --bg:       #F5F0EB;
  --ink:      #1C1C1C;
  --ink-dim:  rgba(28,28,28,0.72);
  --accent:   #9B8B78;
  --divider:  rgba(28,28,28,0.13);
  --ui-bg:    rgba(28,28,28,0.65);
  --ui-hover: rgba(28,28,28,0.80);
}

/* ============================================================
   RESET / BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background-color: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', 'Palatino Linotype', 'Book Antiqua', Georgia, serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: background-color 0.55s ease, color 0.4s ease;
  position: relative;
}

/* Subtle vignette */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.07) 100%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   KEYFRAME ANIMATIONS
   ============================================================ */
@keyframes fadeDown  { from { opacity:0; transform:translateY(-28px) } to { opacity:1; transform:translateY(0) } }
@keyframes fadeUp    { from { opacity:0; transform:translateY(28px) }  to { opacity:1; transform:translateY(0) } }
@keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
@keyframes shimmer   { 0%,100%{ opacity:.45; transform:scale(1) } 50%{ opacity:1; transform:scale(1.5) } }
@keyframes growDown  { from{ transform:scaleY(0); transform-origin:top } to{ transform:scaleY(1); transform-origin:top } }
@keyframes numPulse  { 0%,100%{ opacity:.65 } 50%{ opacity:1 } }
@keyframes slideUp   { from{ opacity:0; transform:translateY(12px) } to{ opacity:1; transform:translateY(0) } }
@keyframes dotDance  { 0%,100%{ transform:scaleX(1) } 50%{ transform:scaleX(1.08) } }
@keyframes stepShow  {
  0%    { opacity: 0; transform: translateY(10px); }
  3.3%  { opacity: 1; transform: translateY(0);    }
  30%   { opacity: 1; transform: translateY(0);    }
  33.3% { opacity: 0; transform: translateY(-6px); }
  100%  { opacity: 0; transform: translateY(0);    }
}

/* ============================================================
   STAGE GRID (landscape)
   ============================================================ */
.stage {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  max-width: 1700px;
  display: grid;
  grid-template-rows: auto auto auto 1fr auto;
  grid-template-areas:
    "header"
    "ornament"
    "subtitle"
    "steps"
    "footer";
  padding: 2.4vh 5.5vw;
  row-gap: 0.6vh;
  align-items: center;
  justify-items: center;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  grid-area: header;
  text-align: center;
  line-height: 1;
  animation: fadeDown 0.9s ease 0.1s both;
}

.t-photo {
  display: block;
  font-size: clamp(1rem, 3.4vw, 3.2rem);
  font-weight: 300;
  font-style: normal;
  letter-spacing: 0.65em;
  text-indent: 0.65em;
  text-transform: uppercase;
}

.t-guestbook {
  display: block;
  font-size: clamp(3rem, 9.5vw, 9.2rem);
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.04em;
  line-height: 0.88;
}

/* ============================================================
   ORNAMENT DIVIDER
   ============================================================ */
.ornament {
  grid-area: ornament;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0.2vh 0;
  animation: fadeIn 1.2s ease 0.55s both;
}

.orn-line {
  flex: 0 0 72px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--accent));
  animation: dotDance 6s ease-in-out infinite;
}
.orn-line:last-child { transform: scaleX(-1); }

.orn-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  animation: shimmer 3.5s ease-in-out infinite;
}

/* ============================================================
   SUBTITLE
   ============================================================ */
.subtitle {
  grid-area: subtitle;
  text-align: center;
  line-height: 1.15;
  animation: fadeIn 1.2s ease 0.75s both;
}

.t-caps {
  display: block;
  font-size: clamp(0.65rem, 1.75vw, 1.55rem);
  font-style: italic;
  font-variant: small-caps;
  letter-spacing: 0.28em;
}

.t-script {
  display: block;
  font-family: 'Dancing Script', 'Brush Script MT', 'Segoe Script', cursive;
  font-size: clamp(1.4rem, 3.6vw, 3.5rem);
  font-weight: 600;
  margin-top: -0.05em;
}

/* ============================================================
   STEPS
   ============================================================ */
.steps {
  grid-area: steps;
  display: flex;
  align-items: stretch;
  justify-content: center;
  width: 100%;
  min-height: 0;
  animation: fadeUp 1s ease 1s both;
}

.step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(6px, 1.5vh, 20px);
  text-align: center;
  padding: clamp(6px, 1.2vh, 16px) 2.8vw;
  min-height: 0;
}

.step-divider {
  width: 1px;
  background: var(--divider);
  flex-shrink: 0;
  align-self: stretch;
  animation: growDown 1.6s ease 1.5s both;
}

.step-num {
  font-size: clamp(1.8rem, 4.5vw, 4.6rem);
  font-style: italic;
  font-weight: 300;
  line-height: 1;
  animation: numPulse 5s ease-in-out infinite;
  color: var(--ink);
}

.step-label {
  font-size: clamp(0.5rem, 1.05vw, 0.92rem);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-family: 'Montserrat', 'Gill Sans', 'Trebuchet MS', system-ui, sans-serif;
  font-weight: 500;
  line-height: 1.5;
  color: var(--ink);
}

.step-icon {
  width:  clamp(55px, 8.5vw, 108px);
  height: clamp(55px, 8.5vw, 108px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
}

/* PNG icons — transparent backgrounds, dark lines by default.
   Invert in dark mode to get light lines on dark background. */
.icon-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
}
body.dark-mode .icon-img { filter: invert(1); }

/* Step cycling: each step fades in → holds → fades out in a 15 s loop.
   Delays are set so steps hand off seamlessly (step N fades out exactly
   when step N+1 starts fading in). */
.step:nth-child(1) { animation: stepShow 15s ease-in-out  2.2s infinite both; }
.step:nth-child(3) { animation: stepShow 15s ease-in-out  7.2s infinite both; }
.step:nth-child(5) { animation: stepShow 15s ease-in-out 12.2s infinite both; }


.step-desc {
  font-size: clamp(0.62rem, 1.28vw, 1.08rem);
  line-height: 1.65;
  font-style: italic;
  color: var(--ink-dim);
  max-width: 200px;
}

/* ============================================================
   FOOTER
   ============================================================ */
.footer {
  grid-area: footer;
  text-align: center;
  line-height: 1.55;
  animation: fadeUp 1s ease 1.3s both;
}

.f-title {
  display: block;
  font-family: 'Montserrat', system-ui, sans-serif;
  font-size: clamp(0.58rem, 1.35vw, 1.12rem);
  letter-spacing: 0.45em;
  text-indent: 0.45em;
  text-transform: uppercase;
  font-weight: 500;
}

.f-sub {
  display: block;
  font-family: 'Montserrat', system-ui, sans-serif;
  font-size: clamp(0.48rem, 1.05vw, 0.88rem);
  letter-spacing: 0.28em;
  text-indent: 0.28em;
  text-transform: uppercase;
  font-weight: 300;
}

/* ============================================================
   CONTENT-EDITABLE STYLING
   ============================================================ */
[contenteditable] {
  outline: none;
  cursor: text;
  border-radius: 4px;
  transition: background 0.18s ease, outline-color 0.18s;
}

[contenteditable]:hover {
  background: rgba(128,128,128,0.06);
}

[contenteditable]:focus {
  background: rgba(128,128,128,0.09);
  outline: 1.5px dashed rgba(128,128,128,0.32);
  outline-offset: 5px;
}

/* ============================================================
   UI BUTTONS — shared base
   ============================================================ */
.ui-btn {
  position: fixed;
  border: none;
  border-radius: 8px;
  background: var(--ui-bg);
  color: #fff;
  cursor: pointer;
  font-family: 'Montserrat', system-ui, sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  padding: 9px 14px;
  z-index: 200;
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.18s, transform 0.15s;
  user-select: none;
}

.ui-btn:hover { background: var(--ui-hover); transform: scale(1.04); }

/* Hide all UI in fullscreen */
body.is-fullscreen .ui-btn,
body.is-fullscreen #color-panel,
body.is-fullscreen #edit-hint { display: none !important; }

/* ============================================================
   FULLSCREEN BUTTON
   ============================================================ */
#btn-fs  { bottom: 18px; right: 18px; }

/* ============================================================
   COLOR TOGGLE BUTTON
   ============================================================ */
#btn-color { bottom: 18px; left: 18px; }

/* ============================================================
   COLOR PANEL
   ============================================================ */
#color-panel {
  position: fixed;
  bottom: 60px;
  left: 18px;
  background: rgba(255,255,255,0.97);
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.16);
  z-index: 201;
  min-width: 210px;
  transition: opacity 0.22s ease, transform 0.22s ease;
}

#color-panel.hidden {
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
}

.cp-label {
  display: block;
  font-family: 'Montserrat', system-ui, sans-serif;
  font-size: 0.63rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 12px;
}

.cp-swatches {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  box-shadow: 0 1px 5px rgba(0,0,0,0.12);
  transition: transform 0.18s, border-color 0.18s;
}
.swatch:hover  { transform: scale(1.2); }
.swatch.active { border-color: #333; }

.cp-hex {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Montserrat', system-ui, sans-serif;
}

.cp-hex label {
  font-size: 0.68rem;
  color: #555;
}

#cp-hex-input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 0.72rem;
  font-family: 'Courier New', monospace;
  color: #333;
  max-width: 90px;
  transition: border-color 0.15s;
}
#cp-hex-input:focus { outline: none; border-color: #888; }

#cp-hex-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.14);
  flex-shrink: 0;
  transition: background 0.2s;
}

/* ============================================================
   EDIT HINT
   ============================================================ */
#edit-hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ui-bg);
  color: rgba(255,255,255,0.92);
  font-family: 'Montserrat', system-ui, sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  padding: 7px 16px;
  border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(6px);
  z-index: 190;
  white-space: nowrap;
  animation: slideUp 0.6s ease 2.5s both;
  transition: opacity 0.5s ease;
}

#edit-hint.gone { opacity: 0; }

</style>
</head>

<script>
/* ----------------------------------------------------------

   ---------------------------------------------------------- */
const btnFS = document.getElementById('btn-fs');

if (!btnFS) { console.error('[GuestBook] btn-fs not found'); }

btnFS.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});

document.addEventListener('fullscreenchange', () => {
  document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
});

/* ----------------------------------------------------------
   COLOR PANEL
   ---------------------------------------------------------- */
const btnColor  = document.getElementById('btn-color');
const panel     = document.getElementById('color-panel');
const swatches  = document.querySelectorAll('.swatch');
const hexInput  = document.getElementById('cp-hex-input');

if (!btnColor) { console.error('[GuestBook] btn-color not found'); }
if (!panel)    { console.error('[GuestBook] color-panel not found'); }
console.log('[GuestBook] swatches found:', swatches.length);

function applyColor(hex, dark) {
  root.style.setProperty('--bg', hex);
  document.body.classList.toggle('dark-mode', dark);
  if (dark) {
    root.style.setProperty('--ink',     '#F0EBE3');
    root.style.setProperty('--ink-dim', 'rgba(240,235,227,0.72)');
    root.style.setProperty('--accent',  '#B8A99A');
    root.style.setProperty('--divider', 'rgba(240,235,227,0.18)');
  } else {
    root.style.setProperty('--ink',     '#1C1C1C');
    root.style.setProperty('--ink-dim', 'rgba(28,28,28,0.72)');
    root.style.setProperty('--accent',  '#9B8B78');
    root.style.setProperty('--divider', 'rgba(28,28,28,0.13)');
  }
  hexInput.value = hex.replace('#', '');
  hexDot.style.background = hex;
}

// Swatch clicks
swatches.forEach(sw => {
  sw.addEventListener('click', () => {
    swatches.forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    applyColor(sw.dataset.color, sw.dataset.dark === 'true');
  });
});

// Hex input — apply on valid 6-char hex
hexInput.addEventListener('input', () => {
  const v = hexInput.value.trim();
  if (/^[0-9A-Fa-f]{6}$/.test(v)) {
    const hex = '#' + v;
    hexDot.style.background = hex;
    applyColor(hex, false);
    swatches.forEach(s => s.classList.remove('active'));
  }
});

// Toggle panel
btnColor.addEventListener('click', e => {
  e.stopPropagation();
  const isHidden = panel.classList.toggle('hidden');
  console.log('[GuestBook] color panel toggled, now hidden:', isHidden);
});

// Close panel on outside click (contains check handles child elements like the SVG icon)
document.addEventListener('click', e => {
  if (!panel.contains(e.target) && !btnColor.contains(e.target)) {
    panel.classList.add('hidden');
  }
});

panel.addEventListener('click', e => e.stopPropagation());

/* ----------------------------------------------------------
   EDITABLE TEXT
   ---------------------------------------------------------- */
const editHint = document.getElementById('edit-hint');
let hintGone   = false;

function dismissHint() {
  if (hintGone) return;
  hintGone = true;
  editHint.classList.add('gone');
}

document.querySelectorAll('[contenteditable]').forEach(el => {
  // Show text cursor & allow selection inside editable
  el.style.userSelect = 'text';

  el.addEventListener('focus', dismissHint);

  // Prevent Enter on single-line fields; allow on [data-ml="true"]
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' && el.dataset.ml !== 'true') {
      e.preventDefault();
    }
  });

  // Prevent paste of rich HTML — paste plain text only
  el.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });
});

// Auto-dismiss hint after 9 seconds
setTimeout(dismissHint, 9000);

/* ----------------------------------------------------------
   KEYBOARD SHORTCUT: F  →  toggle fullscreen
   ---------------------------------------------------------- */
document.addEventListener('keydown', e => {
  if (e.key === 'f' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)
      && !document.activeElement.isContentEditable) {
    btnFS.click();
  }
});
</script>
